version: "3.9"
services:
  postgres:
    container_name: postServiceContainer
    image: postgres:latest
    environment:
      POSTGRES_DB: "PostServiceDB"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "admin"
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5433:5432"
  
  
volumes:
  postgres-data:

  